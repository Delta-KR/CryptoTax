<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --brand: #2563EB;
    --brand-2: #1D4ED8;
    --brand-soft: #EEF4FF;
    --brand-faint: #F5F8FF;
    --ink: #0B1220;
    --ink-2: #1F2937;
    --muted: #5C6678;
    --muted-2: #8A93A4;
    --line: #E6EAF0;
    --line-2: #EEF1F6;
    --bg: #FFFFFF;
    --bg-soft: #FAFBFD;
    --bg-tint: #F4F7FB;
    --card: #FFFFFF;
    --card-2: #F8FAFC;
    --good: #16A34A;
    --good-soft: #ECFDF5;
    --bad: #DC2626;
    --bad-soft: #FEF2F2;
    --warn: #D97706;
    --warn-soft: #FFFBEB;
    --upbit: #0E48F0;
    --bithumb: #F37321;
    --binance: #F0B90B;
    --shadow-sm: 0 1px 2px rgba(15,23,42,.04), 0 0 0 1px rgba(15,23,42,.04);
    --shadow-md: 0 4px 16px -4px rgba(15,23,42,.08), 0 0 0 1px rgba(15,23,42,.05);
    --shadow-lg: 0 24px 48px -12px rgba(15,23,42,.18), 0 0 0 1px rgba(15,23,42,.04);
    --r-sm: 8px;
    --r-md: 12px;
    --r-lg: 16px;
    --r-xl: 24px;
  }
  [data-theme="dark"] {
    --brand: #3B82F6;
    --brand-2: #2563EB;
    --brand-soft: #1E2A4A;
    --brand-faint: #182238;
    --ink: #F1F5F9;
    --ink-2: #E2E8F0;
    --muted: #94A3B8;
    --muted-2: #64748B;
    --line: #1E293B;
    --line-2: #1B2433;
    --bg: #0B1220;
    --bg-soft: #0E1626;
    --bg-tint: #111A2C;
    --card: #131C2E;
    --card-2: #182238;
    --good: #22C55E;
    --good-soft: #0F2A1F;
    --bad: #F87171;
    --bad-soft: #2A1414;
    --warn: #FBBF24;
    --warn-soft: #2A1F0A;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.04);
    --shadow-md: 0 4px 16px -4px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.05);
    --shadow-lg: 0 24px 48px -12px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04);
  }
  [data-theme="dark"] ::selection { background: #1E3A8A; color: #F1F5F9; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--ink);
    background: var(--bg);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss06" 1, "ss03" 1;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  body { overflow-x: hidden; }
  button, a, .nowrap, [data-nowrap] { white-space: nowrap; }
  /* Force nowrap on common short-label patterns to prevent Korean syllable splits in tight flex children */
  .num,
  .badge, .chip, .pill, .stat-label, .stat-value,
  .quirk, .file-badge, .tag, .calc-row > * {
    white-space: nowrap;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "tnum" 1; }
  .num { font-variant-numeric: tabular-nums; }
  button { font-family: inherit; cursor: default; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: #DBEAFE; color: var(--ink); }

  /* ===== Layered atmosphere ===== */
  body { position: relative; }
  body::before, body::after {
    content: ''; position: fixed; pointer-events: none; z-index: 0;
    will-change: transform;
  }
  /* Top-right aurora bloom */
  body::before {
    top: -20vh; right: -15vw; width: 75vw; height: 75vw;
    background: radial-gradient(closest-side, color-mix(in srgb, var(--brand) 22%, transparent), transparent 70%);
    filter: blur(80px);
    opacity: 0.55;
  }
  /* Bottom-left counter bloom */
  body::after {
    bottom: -25vh; left: -15vw; width: 70vw; height: 70vw;
    background: radial-gradient(closest-side, color-mix(in srgb, #8B5CF6 18%, transparent), transparent 70%);
    filter: blur(90px);
    opacity: 0.4;
  }
  [data-theme="dark"] body::before { opacity: 0.7; }
  [data-theme="dark"] body::after { opacity: 0.55; }

  /* Continuous vertical gradient flowing through every section — knits transparent
     sections together with one unified color story instead of hard edges. */
  #root {
    position: relative;
    z-index: 1;
    background:
      linear-gradient(180deg,
        var(--bg) 0%,
        color-mix(in srgb, var(--bg-soft) 70%, var(--bg)) 35%,
        color-mix(in srgb, var(--bg-soft) 80%, var(--bg)) 65%,
        var(--bg) 100%);
  }
  [data-theme="dark"] #root {
    background:
      linear-gradient(180deg,
        var(--bg) 0%,
        color-mix(in srgb, var(--bg-soft) 80%, var(--bg)) 50%,
        var(--bg) 100%);
  }

  /* Bloomed atmosphere — real blur filter on absolutely-positioned blobs scattered
     down the document. Sits behind #root, drives the page-long glow story. */
  .atmosphere {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
    contain: strict;
  }
  /* Fine dot grid — adds visible texture under the bloom so the page never feels empty */
  .atmosphere::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle at center,
      color-mix(in srgb, var(--ink) 10%, transparent) 1px,
      transparent 1.5px);
    background-size: 24px 24px;
    background-position: 0 0;
    opacity: 0.35;
    mask-image: linear-gradient(180deg, transparent 0%, black 8%, black 92%, transparent 100%);
    -webkit-mask-image: linear-gradient(180deg, transparent 0%, black 8%, black 92%, transparent 100%);
  }
  [data-theme="dark"] .atmosphere::before {
    background-image: radial-gradient(circle at center,
      color-mix(in srgb, #fff 14%, transparent) 1px,
      transparent 1.5px);
    opacity: 0.32;
  }
  /* Diagonal hairline streaks — subtle directional motion */
  .atmosphere::after {
    content: '';
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(118deg,
      transparent 0,
      transparent 140px,
      color-mix(in srgb, var(--brand) 8%, transparent) 140px,
      color-mix(in srgb, var(--brand) 8%, transparent) 141px,
      transparent 141px,
      transparent 280px);
    opacity: 0.7;
    mask-image: linear-gradient(180deg, transparent 0%, black 15%, black 85%, transparent 100%);
    -webkit-mask-image: linear-gradient(180deg, transparent 0%, black 15%, black 85%, transparent 100%);
  }
  [data-theme="dark"] .atmosphere::after {
    background-image: repeating-linear-gradient(118deg,
      transparent 0,
      transparent 140px,
      color-mix(in srgb, var(--brand) 14%, transparent) 140px,
      color-mix(in srgb, var(--brand) 14%, transparent) 141px,
      transparent 141px,
      transparent 280px);
    opacity: 0.6;
  }

  .atmosphere .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    will-change: transform;
  }
  /* Light defaults */
  .atmosphere .blob { opacity: 0.7; }
  /* Dark amplifies */
  [data-theme="dark"] .atmosphere .blob { opacity: 0.85; filter: blur(140px); }

  .atmosphere .b1 { top:  -6%; right: -10%; width: 720px; height: 720px;
    background: radial-gradient(closest-side, color-mix(in srgb, var(--brand) 65%, transparent), transparent 70%); }
  .atmosphere .b2 { top:   8%; left:  -8%; width: 640px; height: 640px;
    background: radial-gradient(closest-side, color-mix(in srgb, #8B5CF6 60%, transparent), transparent 70%); }
  /* Bridge blob centered on hero/problem seam — blends the first two sections */
  .atmosphere .b3 { top:  16%; left: 28%; width: 820px; height: 580px;
    background: radial-gradient(closest-side, color-mix(in srgb, var(--brand) 50%, transparent), transparent 70%); }
  .atmosphere .b4 { top:  28%; right: -6%; width: 620px; height: 620px;
    background: radial-gradient(closest-side, color-mix(in srgb, #06B6D4 55%, transparent), transparent 70%); }
  .atmosphere .b5 { top:  42%; left:  -8%; width: 700px; height: 700px;
    background: radial-gradient(closest-side, color-mix(in srgb, var(--brand) 60%, transparent), transparent 70%); }
  .atmosphere .b6 { top:  54%; right: 14%; width: 560px; height: 560px;
    background: radial-gradient(closest-side, color-mix(in srgb, #8B5CF6 55%, transparent), transparent 70%); }
  .atmosphere .b7 { top:  66%; left: 22%; width: 680px; height: 540px;
    background: radial-gradient(closest-side, color-mix(in srgb, #06B6D4 50%, transparent), transparent 70%); }
  .atmosphere .b8 { top:  78%; right: -8%; width: 700px; height: 700px;
    background: radial-gradient(closest-side, color-mix(in srgb, var(--brand) 55%, transparent), transparent 70%); }
  .atmosphere .b9 { bottom: 6%; left: 18%; width: 760px; height: 580px;
    background: radial-gradient(closest-side, color-mix(in srgb, #8B5CF6 55%, transparent), transparent 70%); }
  .atmosphere .b10 { bottom: -8%; right: 18%; width: 640px; height: 640px;
    background: radial-gradient(closest-side, color-mix(in srgb, var(--brand) 50%, transparent), transparent 70%); }

  /* Subtle film grain on dark mode for atmospheric depth */
  [data-theme="dark"] body {
    background-image:
      radial-gradient(1px 1px at 25% 30%, rgba(255,255,255,0.025), transparent 50%),
      radial-gradient(1px 1px at 75% 70%, rgba(255,255,255,0.02), transparent 50%);
    background-size: 220px 220px, 280px 280px;
    background-attachment: fixed;
  }

  /* All section content sits above the fixed atmosphere */
  nav, section, footer { position: relative; z-index: 1; }

  /* Card depth — subtle inner-top highlight + softer outer shadow */
  [data-theme="dark"] {
    --shadow-sm:
      0 1px 0 rgba(255,255,255,.04) inset,
      0 1px 2px rgba(0,0,0,.5),
      0 0 0 1px rgba(255,255,255,.05);
    --shadow-md:
      0 1px 0 rgba(255,255,255,.05) inset,
      0 8px 24px -6px rgba(0,0,0,.6),
      0 0 0 1px rgba(255,255,255,.06);
    --shadow-lg:
      0 1px 0 rgba(255,255,255,.06) inset,
      0 32px 64px -16px rgba(0,0,0,.7),
      0 0 60px -20px rgba(59,130,246,.25),
      0 0 0 1px rgba(255,255,255,.06);
  }
  /* Light mode: refined layered shadow w/ subtle highlight */
  :root {
    --shadow-sm:
      0 1px 0 rgba(255,255,255,.7) inset,
      0 1px 2px rgba(15,23,42,.05),
      0 0 0 1px rgba(15,23,42,.04);
    --shadow-md:
      0 1px 0 rgba(255,255,255,.8) inset,
      0 6px 20px -6px rgba(15,23,42,.10),
      0 0 0 1px rgba(15,23,42,.05);
    --shadow-lg:
      0 1px 0 rgba(255,255,255,.9) inset,
      0 28px 56px -16px rgba(15,23,42,.18),
      0 0 0 1px rgba(15,23,42,.04);
  }

  /* Glassy dark cards — opt-in via .glass class */
  [data-theme="dark"] .glass {
    background: linear-gradient(180deg,
      color-mix(in srgb, var(--card) 82%, transparent) 0%,
      color-mix(in srgb, var(--card) 70%, transparent) 100%);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
  }

  /* Interactive hover — opt-in via .hov class. Pointer-tracked spotlight + lift. */
  .hov {
    position: relative;
    isolation: isolate;
    transition: transform .35s cubic-bezier(.2,.7,.2,1),
                border-color .35s ease,
                box-shadow .35s ease,
                background-color .35s ease;
    will-change: transform;
  }
  .hov::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: inherit;
    pointer-events: none;
    opacity: 0;
    transition: opacity .35s ease;
    background:
      radial-gradient(220px circle at var(--mx, 50%) var(--my, 50%),
        color-mix(in srgb, var(--brand) 12%, transparent) 0%,
        transparent 65%);
    z-index: 0;
    mix-blend-mode: plus-lighter;
  }
  .hov::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: inherit;
    pointer-events: none;
    opacity: 0;
    transition: opacity .4s ease;
    box-shadow:
      0 0 0 1px color-mix(in srgb, var(--brand) 38%, transparent) inset;
    z-index: 0;
  }
  .hov:hover { transform: translateY(-3px); }
  .hov:hover::before { opacity: 1; }
  .hov:hover::after { opacity: 1; }

  [data-theme="dark"] .hov::before {
    background:
      radial-gradient(220px circle at var(--mx, 50%) var(--my, 50%),
        color-mix(in srgb, var(--brand) 22%, transparent) 0%,
        transparent 65%);
  }
  [data-theme="dark"] .hov:hover {
    box-shadow:
      0 1px 0 rgba(255,255,255,.08) inset,
      0 24px 48px -12px rgba(0,0,0,.7),
      0 0 60px -16px color-mix(in srgb, var(--brand) 45%, transparent);
  }
  :root:not([data-theme="dark"]) .hov:hover {
    box-shadow:
      0 1px 0 rgba(255,255,255,.9) inset,
      0 18px 36px -12px rgba(15,23,42,.18),
      0 0 0 1px color-mix(in srgb, var(--brand) 28%, transparent);
  }
</style>
</head>
<script>
  (function() {
    try {
      var t = localStorage.getItem('kontaxt-theme');
      if (t === 'dark' || t === 'light') {
        document.documentElement.setAttribute('data-theme', t);
      }
    } catch (e) {}
  })();

  // Pointer-tracked spotlight on .hov cards — sets --mx / --my CSS vars
  (function() {
    var raf = 0, lastEl = null, lastX = 0, lastY = 0;
    function flush() {
      raf = 0;
      if (lastEl) {
        lastEl.style.setProperty('--mx', lastX + 'px');
        lastEl.style.setProperty('--my', lastY + 'px');
      }
    }
    document.addEventListener('pointermove', function(e) {
      var el = e.target.closest && e.target.closest('.hov');
      if (!el) return;
      var r = el.getBoundingClientRect();
      lastEl = el;
      lastX = e.clientX - r.left;
      lastY = e.clientY - r.top;
      if (!raf) raf = requestAnimationFrame(flush);
    }, { passive: true });
  })();
</script>
